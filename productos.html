<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Productos - Buena Huella</title>
  <script src="js/auth.js"></script>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f5f5f5}
    header{background:#2d5a27;color:#fff;padding:14px;text-align:center}
    .brand{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
    .brand img{width:42px;height:42px;object-fit:cover;border-radius:8px;background:#fff}
    .wrap{max-width:1100px;margin:16px auto;padding:12px}
    .card{background:#fff;padding:12px;border-radius:8px;box-shadow:0 6px 16px rgba(0,0,0,0.06);}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .toolbar input{flex:1 1 280px;min-width:200px}
    input,select,textarea{padding:8px;border:1px solid #ddd;border-radius:6px;width:100%;box-sizing:border-box}
    .grid{display:grid;grid-template-columns:1fr 360px;gap:12px}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .mobile-products{display:none}
    table{width:100%;border-collapse:collapse;min-width:760px}
    th,td{padding:8px;border-bottom:1px solid #eee;text-align:left;font-size:13px}
    .actions button{margin-right:6px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
    .small{font-size:13px;color:#666}
    .label{font-size:13px;color:#333;margin-top:8px}
    .btn{background:#2d5a27;color:#fff;padding:8px 10px;border-radius:6px;border:none;cursor:pointer;font-size:13px}
    .btn.secondary{background:#eee;color:#333}
    .btn:hover{background:#1e4620}
    .btn.secondary:hover{background:#ddd}
    .hide{display:none}
    .two-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media(max-width:600px){
      header{padding:12px}
      header h1{font-size:20px;margin:0}
      .brand{gap:8px}
      .wrap{margin:8px auto;padding:8px}
      .card{padding:10px}
      .toolbar{gap:6px}
      .toolbar input,.toolbar .btn,.toolbar .small{width:100%}
      .toolbar .small{text-align:center}
      .btn{padding:10px}
      .table-wrap{overflow-x:hidden}
      .mobile-products{display:block}
      .table-wrap{display:none}
      table{min-width:0;table-layout:fixed}
      th,td{font-size:12px;padding:7px;word-break:break-word}
      th:nth-child(4),td:nth-child(4),
      th:nth-child(5),td:nth-child(5),
      th:nth-child(6),td:nth-child(6),
      th:nth-child(7),td:nth-child(7){display:none}
      th:nth-child(1),td:nth-child(1){width:48px}
      th:nth-child(2),td:nth-child(2){width:72px}
      th:nth-child(3),td:nth-child(3){width:auto}
      th:nth-child(8),td:nth-child(8){width:92px}
      td.actions{display:flex;flex-direction:column;gap:6px}
      td.actions button{margin-right:0;width:100%}
      .two-cols{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img src="logo.jpg" alt="Logo Buena Huella">
      <h1>Productos — Buena Huella</h1>
    </div>
  </header>
  <div class="wrap">
    <div class="card">
      <div class="toolbar">
        <input id="search" placeholder="Buscar por nombre, SKU, descripción o proveedor" />
        <span id="apiStatusBadge" class="small" style="padding:6px 10px;border-radius:20px;background:#888;color:#fff">🟡 Verificando API...</span>
        <button class="btn secondary" id="ordersBtn">Órdenes de compra</button>
        <button class="btn" id="newBtn">+ Nuevo producto</button>
        <button class="btn secondary" id="exportBtn">Exportar JSON</button>
        <button class="btn secondary" id="importBtn">Importar JSON</button>
      </div>
      <div class="grid">
        <div>
          <div class="table-wrap">
            <table id="productsTable">
              <thead><tr><th>Foto</th><th>SKU</th><th>Nombre</th><th>Precio USD</th><th>Precio ARS</th><th>Stock</th><th>Soporte</th><th></th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
          <div id="mobileProductsList" class="mobile-products"></div>
          <div id="imageModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;padding:20px;overflow-y:auto">
            <div style="background:#fff;max-width:600px;margin:40px auto;border-radius:8px;padding:20px">
              <h3 id="imageModalTitle">Imágenes</h3>
              <div id="imageModalContent" style="max-height:400px;overflow-y:auto"></div>
              <button class="btn secondary" id="closeImageModalBtn" style="width:100%">Cerrar</button>
            </div>
          </div>
          <div id="resourcesModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;padding:20px;overflow-y:auto">
            <div style="background:#fff;max-width:600px;margin:40px auto;border-radius:8px;padding:20px">
              <h3 id="modalTitle">Recursos Técnicos</h3>
              <div id="modalResources" style="border:1px solid #ddd;border-radius:4px;padding:12px;margin:12px 0"></div>
              <button class="btn secondary" id="closeModalBtn" style="width:100%">Cerrar</button>
            </div>
          </div>
        </div>
        <aside>
          <div class="card">
            <h3>Formulario</h3>
            <form id="productForm">
              <input type="hidden" id="productId" />
              <label class="label">SKU *</label>
              <input id="sku" required />
              <label class="label">Nombre *</label>
              <input id="name" required />
              <label class="label">Descripción</label>
              <textarea id="description" rows="3"></textarea>
              <label class="label">Proveedor</label>
              <input id="supplier" />
              <label class="label">🔢 Cálculo de Precios</label>
              <div class="two-cols">
                <div>
                  <label class="label">Precio Proveedor USD *</label>
                  <input id="supplierPriceUsd" type="number" step="0.01" value="0" required />
                </div>
                <div>
                  <label class="label">Costo Flete USD</label>
                  <input id="shippingCostUsd" type="number" step="0.01" value="0" />
                </div>
              </div>
              <div class="two-cols">
                <div>
                  <label class="label">Margen Bruto %</label>
                  <input id="marginPct" type="number" step="0.1" min="0" max="100" value="30" />
                </div>
                <div>
                  <label class="label">Costo Total USD</label>
                  <div id="costTotalUsd" style="padding:8px;background:#f9f9f9;border-radius:6px;border:1px solid #ddd;font-weight:bold;color:#333">$0.00</div>
                </div>
              </div>
              <div class="two-cols">
                <div>
                  <label class="label">IVA %</label>
                  <input id="ivaPct" type="number" step="0.1" min="0" value="21" />
                </div>
                <div>
                  <label class="label">IVA de referencia</label>
                  <div id="ivaPctPreview" style="padding:8px;background:#f9f9f9;border-radius:6px;border:1px solid #ddd;font-weight:bold;color:#333">21%</div>
                </div>
              </div>
              <div class="two-cols">
                <div>
                  <label class="label">Precio Venta USD (sin IVA)</label>
                  <div id="priceSaleUsd" style="padding:8px;background:#e8f5e9;border-radius:6px;border:2px solid #4caf50;font-weight:bold;color:#2e7d32;font-size:16px">$0.00</div>
                </div>
                <div>
                  <label class="label">Precio ARS (referencia)</label>
                  <input id="priceArs" type="number" step="0.01" value="0" placeholder="Referencia" />
                </div>
              </div>
              <div class="two-cols">
                <div>
                  <label class="label">Stock</label>
                  <input id="stock" type="number" step="1" value="0" />
                </div>
                <div>
                  <label class="label">Lead Time (días)</label>
                  <input id="leadTime" type="number" step="1" value="0" />
                </div>
              </div>
              <label class="label">Componentes (JSON)</label>
              <textarea id="components" rows="3" placeholder='[{"sku":"CMP-001","qty":1}]'></textarea>
              <label class="label">Fotos del Producto</label>
              <input type="file" id="imageUpload" accept="image/*" style="font-size:12px" />
              <div id="imagesList" style="max-height:120px;overflow-y:auto;border:1px solid #ddd;border-radius:4px;padding:8px;margin-bottom:8px"></div>
              <button type="button" class="btn secondary" id="addImageBtn" style="width:100%;margin-bottom:8px">+ Agregar Foto</button>
              <label class="label">Información Técnica</label>
              <div id="techResourcesList" style="max-height:150px;overflow-y:auto;border:1px solid #ddd;border-radius:4px;padding:8px;margin-bottom:8px"></div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
                <select id="resourceType">
                  <option value="web">Enlace Web</option>
                  <option value="local">Archivo Local</option>
                  <option value="youtube">YouTube</option>
                </select>
                <input id="resourceUrl" placeholder="URL o ruta local" style="font-size:12px" />
              </div>
              <button type="button" class="btn secondary" id="addResourceBtn" style="width:100%;margin-bottom:8px">+ Agregar Recurso</button>
              <div style="margin-top:8px;display:flex;gap:8px">
                <button class="btn" type="submit">Guardar</button>
                <button type="button" class="btn secondary" id="cancelBtn">Cancelar</button>
              </div>
            </form>
          </div>
        </aside>
      </div>
    </div>
    <p style="margin-top:10px" class="small">Volver al <a href="index.html">inicio</a></p>
  </div>

  <script src="js/api.js?v=20260619-6"></script>
  <script>
    // Storage: usa api.js (API + localStorage fallback)
    function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
    function readProducts(){ return localReadProducts(); }
    function saveProducts(list){ localSaveProducts(list); }

    // DOM refs
    const tableBody = document.querySelector('#productsTable tbody');
    const mobileProductsList = document.getElementById('mobileProductsList');
    const form = document.getElementById('productForm');
    const newBtn = document.getElementById('newBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const search = document.getElementById('search');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const ordersBtn = document.getElementById('ordersBtn');
    const apiStatusBadge = document.getElementById('apiStatusBadge');
    const addResourceBtn = document.getElementById('addResourceBtn');
    const resourceType = document.getElementById('resourceType');
    const resourceUrl = document.getElementById('resourceUrl');
    const techResourcesList = document.getElementById('techResourcesList');
    const resourcesModal = document.getElementById('resourcesModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const modalTitle = document.getElementById('modalTitle');
    const modalResources = document.getElementById('modalResources');
    const imageModal = document.getElementById('imageModal');
    const closeImageModalBtn = document.getElementById('closeImageModalBtn');
    const imageModalTitle = document.getElementById('imageModalTitle');
    const imageModalContent = document.getElementById('imageModalContent');
    const imageUpload = document.getElementById('imageUpload');
    const addImageBtn = document.getElementById('addImageBtn');
    const imagesList = document.getElementById('imagesList');
    const supplierPriceUsdEl = document.getElementById('supplierPriceUsd');
    const shippingCostUsdEl = document.getElementById('shippingCostUsd');
    const marginPctEl = document.getElementById('marginPct');
    const ivaPctEl = document.getElementById('ivaPct');
    const ivaPctPreviewEl = document.getElementById('ivaPctPreview');
    const costTotalUsdEl = document.getElementById('costTotalUsd');
    const priceSaleUsdEl = document.getElementById('priceSaleUsd');
    const hostNow = (window.location.hostname || '').toLowerCase();
    const isProductionHostNow = hostNow === 'buenahuella.com.ar' || hostNow === 'www.buenahuella.com.ar';

    // Technical resources state
    let currentTechResources = [];
    let currentImages = [];
    if (apiStatusBadge) {
      apiStatusBadge.style.background = isProductionHostNow ? '#2d5a27' : '#888';
      apiStatusBadge.textContent = isProductionHostNow ? '🟢 API conectada' : '🟡 Verificando API...';
    }

    function updatePriceCalculations() {
      const supplierPrice = parseFloat(supplierPriceUsdEl.value) || 0;
      const shippingCost = parseFloat(shippingCostUsdEl.value) || 0;
      const parsedMargin = parseFloat(marginPctEl.value);
      const margin = Number.isFinite(parsedMargin) ? parsedMargin : 30;
      const parsedIva = parseFloat(ivaPctEl.value);
      const iva = Number.isFinite(parsedIva) ? parsedIva : 21;

      const costTotal = supplierPrice + shippingCost;
      const marginDecimal = margin / 100;
      const priceSale = marginDecimal >= 1 ? costTotal * 2 : costTotal / (1 - marginDecimal);

      costTotalUsdEl.textContent = '$' + costTotal.toFixed(2);
      priceSaleUsdEl.textContent = '$' + priceSale.toFixed(2);
      if (ivaPctPreviewEl) {
        ivaPctPreviewEl.textContent = iva.toFixed(1).replace(/\.0$/, '') + '%';
      }
    }

    function escapeHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    function toNumber(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }
    function normText(s){
      const raw = String(s || '').toLowerCase().trim();
      if (!raw) return '';
      const base = (typeof raw.normalize === 'function')
        ? raw.normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        : raw;
      return base.replace(/\s+/g, ' ');
    }

    function renderTechResources(){
      techResourcesList.innerHTML = '';
      for(let i = 0; i < currentTechResources.length; i++){
        const res = currentTechResources[i];
        const type = res.type === 'web' ? '🌐' : res.type === 'local' ? '📄' : '🎥';
        const item = document.createElement('div');
        item.style.cssText = 'padding:6px;border-bottom:1px solid #eee;font-size:12px;display:flex;justify-content:space-between;align-items:center';
        const link = res.type === 'local' ? res.url.split('\\').pop() : res.url.substring(0, 40);
        item.innerHTML = `<span>${type} ${escapeHtml(link)}</span><button type="button" data-idx="${i}" class="btn secondary" style="padding:4px 6px;font-size:11px">Quitar</button>`;
        item.querySelector('button').addEventListener('click',e=>{
          currentTechResources.splice(parseInt(e.target.getAttribute('data-idx')), 1);
          renderTechResources();
        });
        techResourcesList.appendChild(item);
      }
    }

    function renderImagesList(){
      imagesList.innerHTML = '';
      for(let i = 0; i < currentImages.length; i++){
        const img = currentImages[i];
        const item = document.createElement('div');
        item.style.cssText = 'padding:4px;border-bottom:1px solid #eee;font-size:12px;display:flex;justify-content:space-between;align-items:center';
        const preview = img.startsWith('data:') ? '[Base64]' : img.substring(0,40);
        item.innerHTML = `<span>🖼️ ${escapeHtml(preview)}</span><button type="button" data-idx="${i}" class="btn secondary" style="padding:4px 6px;font-size:11px">Quitar</button>`;
        item.querySelector('button').addEventListener('click',e=>{
          currentImages.splice(parseInt(e.target.getAttribute('data-idx')), 1);
          renderImagesList();
        });
        imagesList.appendChild(item);
      }
    }

    function showImages(productName, images){
      imageModalTitle.textContent = 'Fotos: '+productName;
      imageModalContent.innerHTML = '';
      if(!images.length){
        imageModalContent.innerHTML = '<p style="color:#999">Sin imágenes</p>';
      } else {
        for(const img of images){
          const div = document.createElement('div');
          div.style.cssText = 'margin-bottom:12px;text-align:center';
          const imgEl = document.createElement('img');
          imgEl.src = img;
          imgEl.style.cssText = 'max-width:100%;max-height:300px;border-radius:4px;border:1px solid #ddd';
          div.appendChild(imgEl);
          imageModalContent.appendChild(div);
        }
      }
      imageModal.style.display = 'block';
    }

    function showResources(productName, resources){
      modalTitle.textContent = 'Soporte: '+productName;
      modalResources.innerHTML = '';
      if(!resources.length){
        modalResources.innerHTML = '<p style="color:#999">Sin recursos técnicos</p>';
      } else {
        for(const res of resources){
          const div = document.createElement('div');
          div.style.cssText = 'padding:10px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px';
          const typeLabel = res.type === 'web' ? '🌐 Web' : res.type === 'local' ? '📄 Local' : '🎥 YouTube';
          const displayUrl = res.type === 'local' ? res.url.split('\\').pop() : res.url.length > 50 ? res.url.substring(0,47)+'...' : res.url;
          const link = res.type === 'local' ? `<code style="background:#f5f5f5;padding:4px;border-radius:3px;font-size:11px">${escapeHtml(displayUrl)}</code>` : `<a href="${escapeHtml(res.url)}" target="_blank" style="color:#2d5a27;text-decoration:none">${escapeHtml(displayUrl)}</a>`;
          div.innerHTML = `<strong>${typeLabel}</strong> ${link}`;
          modalResources.appendChild(div);
        }
      }
      resourcesModal.style.display = 'block';
    }

    addResourceBtn.addEventListener('click',()=>{
      const url = resourceUrl.value.trim();
      const type = resourceType.value;
      if(!url){ alert('Ingresa URL o ruta'); return }
      currentTechResources.push({type, url});
      resourceUrl.value = '';
      renderTechResources();
    })

    closeModalBtn.addEventListener('click',()=>{
      resourcesModal.style.display = 'none';
    })

    resourcesModal.addEventListener('click',e=>{
      if(e.target === resourcesModal) resourcesModal.style.display = 'none';
    })

    closeImageModalBtn.addEventListener('click',()=>{
      imageModal.style.display = 'none';
    })

    imageModal.addEventListener('click',e=>{
      if(e.target === imageModal) imageModal.style.display = 'none';
    })

    addImageBtn.addEventListener('click',()=>{
      imageUpload.click();
    })

    imageUpload.addEventListener('change',e=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = evt => {
        currentImages.push(evt.target.result);
        renderImagesList();
        imageUpload.value = '';
      };
      reader.readAsDataURL(file);
    })


    function render(filter){
      const q = normText(filter);
      const tokens = q ? q.split(' ').filter(Boolean) : [];
      const products = readProducts().filter(p=>{
        if(!tokens.length) return true;
        const haystack = normText([
          p.name,
          p.sku,
          p.description,
          p.supplier,
          p.id,
          JSON.stringify(p || {})
        ].join(' '));
        return tokens.every(t => haystack.includes(t));
      });
      tableBody.innerHTML = '';
      if (mobileProductsList) mobileProductsList.innerHTML = '';
      if (!products.length) {
        tableBody.innerHTML = '<tr><td colspan="8" class="small">Sin resultados</td></tr>';
        if (mobileProductsList) mobileProductsList.innerHTML = '<div style="padding:12px;color:#666;font-size:13px">Sin resultados</div>';
      }
      for(const p of products){
        const tr = document.createElement('tr');
        const techCount = (p.technicalInfo || []).length;
        const techBtn = techCount > 0 ? `<button type="button" data-sku="${p.sku}" data-name="${p.name}" class="btn secondary view-resources" style="font-size:12px">📚 ${techCount}</button>` : '—';
        const photoCount = (p.images || []).length;
        const photoBtn = photoCount > 0 ? `<button type="button" data-sku="${p.sku}" data-name="${p.name}" class="btn secondary view-images" style="font-size:12px;background:#0066cc">📷 ${photoCount}</button>` : '—';
        tr.innerHTML = `<td>${photoBtn}</td><td>${escapeHtml(p.sku||'')}</td><td>${escapeHtml(p.name||'')}</td><td>${toNumber(p.priceUsd).toFixed(2)}</td><td>${toNumber(p.priceArs).toFixed(2)}</td><td>${toNumber(p.stock)}</td><td>${techBtn}</td><td class="actions"><button data-id="${p.id}" class="btn secondary order">OC</button><button data-id="${p.id}" class="btn secondary export-component">Comp</button><button data-id="${p.id}" class="btn secondary edit">Editar</button><button data-id="${p.id}" class="btn secondary del">Borrar</button></td>`;
        tableBody.appendChild(tr);

        if (mobileProductsList) {
          const card = document.createElement('div');
          card.style.cssText = 'background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:10px 12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.04)';
          card.innerHTML = `
            <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
              <div style="min-width:0">
                <div style="font-size:12px;color:#666">${escapeHtml(p.sku || 'Sin SKU')}</div>
                <div style="font-size:16px;font-weight:700;line-height:1.2;margin:2px 0">${escapeHtml(p.name || 'Sin nombre')}</div>
                <div style="font-size:13px;color:#555;line-height:1.35">${escapeHtml((p.description || '').trim() || 'Sin descripción')}</div>
              </div>
              <div style="text-align:right;flex:0 0 auto">
                <div style="font-size:12px;color:#666">Stock</div>
                <div style="font-size:18px;font-weight:700">${toNumber(p.stock)}</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;font-size:13px">
              <div><strong>USD:</strong> ${toNumber(p.priceUsd).toFixed(2)}</div>
              <div><strong>ARS:</strong> ${toNumber(p.priceArs).toFixed(2)}</div>
              <div><strong>Fotos:</strong> ${photoCount}</div>
              <div><strong>Soporte:</strong> ${techCount}</div>
            </div>
            <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
              <button type="button" data-id="${p.id}" class="btn secondary order" style="flex:1">OC</button>
              <button type="button" data-id="${p.id}" class="btn secondary export-component" style="flex:1">Comp</button>
              <button type="button" data-id="${p.id}" class="btn secondary edit" style="flex:1">Editar</button>
              <button type="button" data-id="${p.id}" class="btn secondary del" style="flex:1">Borrar</button>
            </div>`;
          mobileProductsList.appendChild(card);
        }
      }
      // Attach event listeners to resource buttons
      document.querySelectorAll('.view-resources').forEach(btn=>{
        btn.addEventListener('click',e=>{
          const sku = e.target.getAttribute('data-sku');
          const name = e.target.getAttribute('data-name');
          const p = readProducts().find(x=>x.sku===sku);
          if(p) showResources(name, p.technicalInfo || []);
        })
      })
      // Attach event listeners to image buttons
      document.querySelectorAll('.view-images').forEach(btn=>{
        btn.addEventListener('click',e=>{
          const sku = e.target.getAttribute('data-sku');
          const name = e.target.getAttribute('data-name');
          const p = readProducts().find(x=>x.sku===sku);
          if(p) showImages(name, p.images || []);
        })
      })
    }

    tableBody.addEventListener('click',e=>{
      const id = e.target.getAttribute('data-id');
      if(e.target.classList.contains('order')){openOrder(id)}
      if(e.target.classList.contains('export-component')){exportComponent(id)}
      if(e.target.classList.contains('edit')){openEdit(id)}
      if(e.target.classList.contains('del')){
        if(confirm('¿Borrar producto?')){
          deleteProduct(id).then(()=>render(search.value));
        }
      }
    })

    if (mobileProductsList) {
      mobileProductsList.addEventListener('click', e => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const id = btn.getAttribute('data-id');
        if (!id) return;
        if (btn.classList.contains('order')) openOrder(id);
        if (btn.classList.contains('export-component')) exportComponent(id);
        if (btn.classList.contains('edit')) openEdit(id);
        if (btn.classList.contains('del')) {
          if (confirm('¿Borrar producto?')) {
            deleteProduct(id).then(() => render(search.value));
          }
        }
      });
    }

    function openEdit(id){
      const products = readProducts();
      const p = products.find(x=>x.id===id);
      if(!p) return;
      document.getElementById('productId').value = p.id;
      document.getElementById('sku').value = p.sku||'';
      document.getElementById('name').value = p.name||'';
      document.getElementById('description').value = p.description||'';
      document.getElementById('supplier').value = p.supplier||'';
      const hasNewPricing = p.supplierPriceUsd != null || p.shippingCostUsd != null || p.marginPct != null;
      supplierPriceUsdEl.value = p.supplierPriceUsd != null ? p.supplierPriceUsd : (p.priceUsd || 0);
      shippingCostUsdEl.value = p.shippingCostUsd != null ? p.shippingCostUsd : 0;
      marginPctEl.value = p.marginPct != null ? p.marginPct : (hasNewPricing ? 30 : 0);
      ivaPctEl.value = p.ivaPct != null ? p.ivaPct : 21;
      document.getElementById('priceArs').value = p.priceArs||0;
      setTimeout(updatePriceCalculations, 100);
      document.getElementById('stock').value = p.stock||0;
      document.getElementById('leadTime').value = p.leadTime||0;
      document.getElementById('components').value = p.components ? JSON.stringify(p.components,null,2) : '[]';
      currentTechResources = p.technicalInfo ? [...p.technicalInfo] : [];
      currentImages = p.images ? [...p.images] : [];
      renderTechResources();
      renderImagesList();
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function openOrder(id){
      const p = readProducts().find(x => x.id === id);
      if (!p) return;
      const qs = `productId=${encodeURIComponent(id)}${p.supplier ? '&providerName=' + encodeURIComponent(p.supplier) : ''}`;
      window.location.href = `orden-de-compras.html?${qs}`;
    }

    async function exportComponent(id){
      const p = readProducts().find(x => x.id === id);
      if (!p) return;
      const component = {
        sku: p.sku || '',
        qty: 1,
        name: p.name || '',
        description: p.description || '',
        supplier: p.supplier || '',
        priceUsd: toNumber(p.priceUsd),
        priceArs: toNumber(p.priceArs),
        leadTime: toNumber(p.leadTime),
        stock: toNumber(p.stock),
        salePriceUsd: toNumber(p.priceUsd),
        source: 'productos',
        sourceProductId: p.id || '',
        sourceProductSku: p.sku || ''
      };
      const text = JSON.stringify(component, null, 2);
      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(text);
          alert('✅ Componente copiado al portapapeles');
          return;
        } catch (err) {
          alert('No se pudo copiar al portapapeles. Te muestro el JSON para copiar manualmente.');
        }
      }
      prompt('Copiá este JSON de componente:', text);
    }

    function deleteProductLocal(id){
      const list = readProducts().filter(x=>x.id!==id);
      saveProducts(list); render(search.value);
    }

    form.addEventListener('submit', async e=>{
      e.preventDefault();
      const id = document.getElementById('productId').value || uid();
      let components = [];
      try{
        const cStr = document.getElementById('components').value.trim();
        if(cStr) components = JSON.parse(cStr);
      }catch(err){
        alert('Componentes: JSON inválido');
        return;
      }
      const product = {
        id,
        sku:document.getElementById('sku').value.trim(),
        name:document.getElementById('name').value.trim(),
        description:document.getElementById('description').value.trim(),
        supplier:document.getElementById('supplier').value.trim(),
        supplierPriceUsd:parseFloat(supplierPriceUsdEl.value)||0,
        shippingCostUsd:parseFloat(shippingCostUsdEl.value)||0,
        marginPct:Number.isFinite(parseFloat(marginPctEl.value)) ? parseFloat(marginPctEl.value) : 30,
        ivaPct:Number.isFinite(parseFloat(ivaPctEl.value)) ? parseFloat(ivaPctEl.value) : 21,
        priceUsd:parseFloat(priceSaleUsdEl.textContent.replace(/\$/g,''))||0,
        priceArs:parseFloat(document.getElementById('priceArs').value)||0,
        stock:parseInt(document.getElementById('stock').value)||0,
        leadTime:parseInt(document.getElementById('leadTime').value)||0,
        components:components,
        technicalInfo:currentTechResources,
        images:currentImages,
        createdAt:new Date().toISOString()
      };
      const existing = readProducts().find(x=>x.id===id);
      if(existing) product.createdAt = existing.createdAt;
      try {
        await saveProduct(product);
        form.reset(); document.getElementById('productId').value=''; currentTechResources=[]; currentImages=[]; renderTechResources(); renderImagesList(); updatePriceCalculations(); render();
        alert('✅ Producto guardado');
      } catch(err) {
        render(); // mostrar igual (guardado local)
        alert('⚠️ Guardado solo localmente. Error API: ' + err.message);
      }
    })

    newBtn.addEventListener('click',()=>{form.reset(); document.getElementById('productId').value=''; currentTechResources = []; currentImages = []; renderTechResources(); renderImagesList(); updatePriceCalculations(); resourceUrl.value=''; imageUpload.value=''; window.scrollTo({top:0,behavior:'smooth'})});
    cancelBtn.addEventListener('click',()=>{form.reset(); document.getElementById('productId').value=''; currentTechResources = []; currentImages = []; renderTechResources(); renderImagesList(); updatePriceCalculations(); resourceUrl.value=''; imageUpload.value='';});
    // Event listeners para cálculo de precios
    ;[supplierPriceUsdEl, shippingCostUsdEl, marginPctEl, ivaPctEl].forEach(el => {
      if (el) el.addEventListener('input', updatePriceCalculations);
      if (el) el.addEventListener('change', updatePriceCalculations);
    });

    search.addEventListener('input',e=>render(e.target.value))
    search.addEventListener('keyup',e=>render(e.target.value))
    if (ordersBtn) {
      ordersBtn.addEventListener('click', () => {
        window.location.href = 'orden-de-compras.html';
      });
    }

    exportBtn.addEventListener('click',()=>{
      const data = JSON.stringify(localReadProducts());
      const blob = new Blob([data],{type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='productos.json'; a.click(); URL.revokeObjectURL(url);
    })

    importBtn.addEventListener('click',async ()=>{
      const text = prompt('Pega aquí el JSON de productos o cancela');
      if(!text) return;
      try{
        const parsed = JSON.parse(text);
        if(Array.isArray(parsed)){
          saveProducts(parsed); render(); alert('Importado: '+parsed.length+' productos');
        } else alert('JSON inválido, se espera un array');
      }catch(e){alert('JSON inválido')}
    })

    updatePriceCalculations();

    // Init: cargar desde API
    (async ()=>{
      async function fetchProductsDirect() {
        const urls = [
          `${window.location.origin}/sistema/api/products`,
          `${window.location.origin}/api/products`,
          'https://www.buenahuella.com.ar/sistema/api/products',
          'https://buenahuella.com.ar/sistema/api/products'
        ];
        for (const url of urls) {
          try {
            const res = await fetch(url);
            if (!res.ok) continue;
            const data = await res.json();
            if (Array.isArray(data)) return data;
          } catch (e) {}
        }
        return null;
      }

      let online = false;
      if (typeof checkApiStatus === 'function') {
        online = await Promise.race([
          checkApiStatus(),
          new Promise(resolve => setTimeout(() => resolve(false), 6000))
        ]);
      }
      if (apiStatusBadge) {
        apiStatusBadge.style.background = online ? '#2d5a27' : '#888';
        apiStatusBadge.textContent = online ? '🟢 API conectada' : '🟡 Modo offline';
      }

      const localBackup = localReadProducts();
      let products = await getProducts();
      if (!Array.isArray(products)) products = [];

      const directProducts = await fetchProductsDirect();
      if (Array.isArray(directProducts)) {
        online = true;
        // Prioriza API para evitar quedarse con un cache local incompleto.
        if (directProducts.length || !localBackup.length) {
          products = directProducts;
          localSaveProducts(directProducts);
        }
      } else if (!products.length && localBackup.length) {
        products = localBackup;
        localSaveProducts(localBackup);
      }

      if (apiStatusBadge) {
        apiStatusBadge.style.background = online ? '#2d5a27' : '#888';
        apiStatusBadge.textContent = online ? '🟢 API conectada' : '🟡 Modo offline';
      }

      if (!products.length && !localReadProducts().length) {
        const sample = [
          {id:uid(),sku:'GWAY-001',name:'Gateway LoRa 12V',description:'Receptor LoRa para monitoreo remoto',supplier:'Buena Huella',supplierPriceUsd:92,shippingCostUsd:8,marginPct:20,priceUsd:125,priceArs:25000,stock:5,leadTime:0,components:[{sku:'CMP-001',qty:1}],technicalInfo:[],images:[],createdAt:new Date().toISOString()},
          {id:uid(),sku:'SENS-001',name:'Sensor Ultrasónico Nivel',description:'Sensor para medir nivel de agua',supplier:'Buena Huella',supplierPriceUsd:31,shippingCostUsd:4,marginPct:22,priceUsd:44.87,priceArs:9500,stock:8,leadTime:0,components:[{sku:'CMP-001',qty:1}],technicalInfo:[],images:[],createdAt:new Date().toISOString()}
        ];
        localSaveProducts(sample);
      }
      render();
    })();

    window._buena = {readProducts:localReadProducts, render};
  </script>
</body>
</html>
