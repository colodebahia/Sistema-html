<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Productos - Buena Huella</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f5f5f5}
    header{background:#2d5a27;color:#fff;padding:14px;text-align:center}
    .wrap{max-width:1100px;margin:16px auto;padding:12px}
    .card{background:#fff;padding:12px;border-radius:8px;box-shadow:0 6px 16px rgba(0,0,0,0.06);}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    input,select,textarea{padding:8px;border:1px solid #ddd;border-radius:6px;width:100%;box-sizing:border-box}
    .grid{display:grid;grid-template-columns:1fr 360px;gap:12px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #eee;text-align:left;font-size:13px}
    .actions button{margin-right:6px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
    .small{font-size:13px;color:#666}
    .label{font-size:13px;color:#333;margin-top:8px}
    .btn{background:#2d5a27;color:#fff;padding:8px 10px;border-radius:6px;border:none;cursor:pointer;font-size:13px}
    .btn.secondary{background:#eee;color:#333}
    .btn:hover{background:#1e4620}
    .btn.secondary:hover{background:#ddd}
    .hide{display:none}
    .two-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media(max-width:600px){.two-cols{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><h1>Productos — Buena Huella</h1></header>
  <div class="wrap">
    <div class="card">
      <div class="toolbar">
        <input id="search" placeholder="Buscar por nombre, SKU o proveedor" />
        <button class="btn" id="newBtn">+ Nuevo producto</button>
        <button class="btn secondary" id="exportBtn">Exportar JSON</button>
        <button class="btn secondary" id="importBtn">Importar JSON</button>
      </div>
      <div class="grid">
        <div>
          <table id="productsTable">
            <thead><tr><th>SKU</th><th>Nombre</th><th>Precio USD</th><th>Precio ARS</th><th>Stock</th><th></th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <aside>
          <div class="card">
            <h3>Formulario</h3>
            <form id="productForm">
              <input type="hidden" id="productId" />
              <label class="label">SKU *</label>
              <input id="sku" required />
              <label class="label">Nombre *</label>
              <input id="name" required />
              <label class="label">Descripción</label>
              <textarea id="description" rows="3"></textarea>
              <label class="label">Proveedor</label>
              <input id="supplier" />
              <div class="two-cols">
                <div>
                  <label class="label">Precio USD</label>
                  <input id="priceUsd" type="number" step="0.01" />
                </div>
                <div>
                  <label class="label">Precio ARS</label>
                  <input id="priceArs" type="number" step="0.01" />
                </div>
              </div>
              <div class="two-cols">
                <div>
                  <label class="label">Stock</label>
                  <input id="stock" type="number" step="1" value="0" />
                </div>
                <div>
                  <label class="label">Lead Time (días)</label>
                  <input id="leadTime" type="number" step="1" value="0" />
                </div>
              </div>
              <label class="label">Componentes (JSON)</label>
              <textarea id="components" rows="3" placeholder='[{"sku":"CMP-001","qty":1}]'></textarea>
              <div style="margin-top:8px;display:flex;gap:8px">
                <button class="btn" type="submit">Guardar</button>
                <button type="button" class="btn secondary" id="cancelBtn">Cancelar</button>
              </div>
            </form>
          </div>
        </aside>
      </div>
    </div>
    <p style="margin-top:10px" class="small">Volver al <a href="index.html">inicio</a></p>
  </div>

  <script>
    // Storage and basic CRUD
    const STORAGE_KEY = 'buena_products_v1';
    function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
    function readProducts(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(e){return[]}}
    function saveProducts(list){localStorage.setItem(STORAGE_KEY,JSON.stringify(list))}

    // DOM refs
    const tableBody = document.querySelector('#productsTable tbody');
    const form = document.getElementById('productForm');
    const newBtn = document.getElementById('newBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const search = document.getElementById('search');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');

    function escapeHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

    function render(filter){
      const q = (filter||'').toLowerCase();
      const products = readProducts().filter(p=>{
        if(!q) return true;
        return (p.name||'').toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q) || (p.supplier||'').toLowerCase().includes(q)
      });
      tableBody.innerHTML = '';
      for(const p of products){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${escapeHtml(p.sku||'')}</td><td>${escapeHtml(p.name||'')}</td><td>${(p.priceUsd||0).toFixed(2)}</td><td>${(p.priceArs||0).toFixed(2)}</td><td>${p.stock||0}</td><td class="actions"><button data-id="${p.id}" class="btn secondary edit">Editar</button><button data-id="${p.id}" class="btn secondary del">Borrar</button></td>`;
        tableBody.appendChild(tr);
      }
    }

    tableBody.addEventListener('click',e=>{
      const id = e.target.getAttribute('data-id');
      if(e.target.classList.contains('edit')){openEdit(id)}
      if(e.target.classList.contains('del')){if(confirm('¿Borrar producto?')){deleteProduct(id)}}
    })

    function openEdit(id){
      const products = readProducts();
      const p = products.find(x=>x.id===id);
      if(!p) return;
      document.getElementById('productId').value = p.id;
      document.getElementById('sku').value = p.sku||'';
      document.getElementById('name').value = p.name||'';
      document.getElementById('description').value = p.description||'';
      document.getElementById('supplier').value = p.supplier||'';
      document.getElementById('priceUsd').value = p.priceUsd||0;
      document.getElementById('priceArs').value = p.priceArs||0;
      document.getElementById('stock').value = p.stock||0;
      document.getElementById('leadTime').value = p.leadTime||0;
      document.getElementById('components').value = p.components ? JSON.stringify(p.components,null,2) : '[]';
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function deleteProduct(id){
      const list = readProducts().filter(x=>x.id!==id);
      saveProducts(list); render(search.value);
    }

    form.addEventListener('submit',e=>{
      e.preventDefault();
      const id = document.getElementById('productId').value || uid();
      let components = [];
      try{
        const cStr = document.getElementById('components').value.trim();
        if(cStr) components = JSON.parse(cStr);
      }catch(err){
        alert('Componentes: JSON inválido');
        return;
      }
      const product = {
        id,
        sku:document.getElementById('sku').value.trim(),
        name:document.getElementById('name').value.trim(),
        description:document.getElementById('description').value.trim(),
        supplier:document.getElementById('supplier').value.trim(),
        priceUsd:parseFloat(document.getElementById('priceUsd').value)||0,
        priceArs:parseFloat(document.getElementById('priceArs').value)||0,
        stock:parseInt(document.getElementById('stock').value)||0,
        leadTime:parseInt(document.getElementById('leadTime').value)||0,
        components:components,
        createdAt:new Date().toISOString()
      };
      const existing = readProducts().find(x=>x.id===id);
      if(existing) product.createdAt = existing.createdAt;
      const list = readProducts().filter(x=>x.id!==id).concat([product]);
      saveProducts(list);
      form.reset(); document.getElementById('productId').value=''; render();
      alert('Producto guardado');
    })

    newBtn.addEventListener('click',()=>{form.reset(); document.getElementById('productId').value=''; window.scrollTo({top:0,behavior:'smooth'})})
    cancelBtn.addEventListener('click',()=>{form.reset(); document.getElementById('productId').value='';})
    search.addEventListener('input',e=>render(e.target.value))

    exportBtn.addEventListener('click',()=>{
      const data = localStorage.getItem(STORAGE_KEY) || '[]';
      const blob = new Blob([data],{type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='productos.json'; a.click(); URL.revokeObjectURL(url);
    })

    importBtn.addEventListener('click',async ()=>{
      const text = prompt('Pega aquí el JSON de productos o cancela');
      if(!text) return;
      try{
        const parsed = JSON.parse(text);
        if(Array.isArray(parsed)){
          saveProducts(parsed); render(); alert('Importado: '+parsed.length+' productos');
        } else alert('JSON inválido, se espera un array');
      }catch(e){alert('JSON inválido')}
    })

    // init sample data if empty
    if(!localStorage.getItem(STORAGE_KEY)){
      const sample = [
        {id:uid(),sku:'GWAY-001',name:'Gateway LoRa 12V',description:'Receptor LoRa para monitoreo remoto',supplier:'Buena Huella',priceUsd:120,priceArs:25000,stock:5,leadTime:0,components:[{sku:'CMP-001',qty:1},{sku:'CMP-002',qty:1}],createdAt:new Date().toISOString()},
        {id:uid(),sku:'SENS-001',name:'Sensor Ultrasónico Nivel',description:'Sensor para medir nivel de agua',supplier:'Buena Huella',priceUsd:45,priceArs:9500,stock:8,leadTime:0,components:[{sku:'CMP-001',qty:1}],createdAt:new Date().toISOString()}
      ];
      saveProducts(sample);
    }

    render();
    window._buena = {readProducts,saveProducts,render};
  </script>
</body>
</html>
